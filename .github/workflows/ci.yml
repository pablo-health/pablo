name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  version-check:
    name: Version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check version sync
        run: bash scripts/check-version-sync.sh

  migration-lint:
    name: Models ship with migrations
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Check models ship with migrations (guardrail #4)
        run: python .claude/skills/migration-lint/check.py --base origin/${{ github.base_ref }}

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/boost
          sudo apt-get clean

      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pipx install poetry

      - name: Configure Poetry virtualenv location
        run: poetry config virtualenvs.in-project true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Audit Python dependencies
        run: |
          pipx inject poetry poetry-plugin-export
          poetry export --only=main --without-hashes -f requirements.txt -o /tmp/requirements-audit.txt
          pipx run pip-audit -r /tmp/requirements-audit.txt --no-deps --disable-pip

      - name: Lint (ruff + mypy)
        run: make lint

      - name: Test (pytest)
        run: cd backend && poetry run pytest tests/ -m "not spacy" --cov=app --cov-report=term-missing --cov-report=html

  backend-integration:
    name: Backend integration (Postgres)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pipx install poetry

      - name: Configure Poetry virtualenv location
        run: poetry config virtualenvs.in-project true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      # Postgres comes up via testcontainers — see
      # backend/tests_integration/conftest.py. Docker is preinstalled on
      # ubuntu-latest runners; no extra setup needed.
      - name: Run audit-write integration tests
        run: |
          cd backend && poetry run pytest \
            tests_integration/database/test_audit_writes.py \
            tests_integration/database/test_platform_audit_writes.py \
            -v

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_fetch_retries: 5
          npm_config_fetch_retry_mintimeout: 20000

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --run
