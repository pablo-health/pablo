name: Mirror Chainguard Base Images

# Pulls latest Chainguard images (0 CVEs) and pushes them to GHCR
# with date-stamped + :latest tags, then opens a PR to bump the
# pinned version in Dockerfiles. This gives us:
#   - Zero CVEs in base images (Chainguard rebuilds nightly)
#   - Reproducible builds (date-stamped tags are immutable)
#   - Controlled rollout (PR review before adopting new image)
#   - Audit trail (git history of version bumps)

on:
  schedule:
    - cron: "0 7 * * 1" # Weekly Monday 7am UTC (after security scan at 6am)
  workflow_dispatch: # Manual trigger

env:
  REGISTRY: ghcr.io

jobs:
  mirror:
    name: Mirror base images
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull, tag, and push images
        id: mirror
        run: |
          DATE_TAG=$(date +%Y-%m-%d)
          echo "date_tag=${DATE_TAG}" >> "$GITHUB_OUTPUT"

          for pair in \
            "cgr.dev/chainguard/python:latest pablo-health/base-python" \
            "cgr.dev/chainguard/node:latest pablo-health/base-node"; do

            SOURCE=$(echo "$pair" | awk '{print $1}')
            TARGET=$(echo "$pair" | awk '{print $2}')

            echo "=== Mirroring ${SOURCE} → ${REGISTRY}/${TARGET}:${DATE_TAG} ==="
            docker pull "${SOURCE}"
            docker tag "${SOURCE}" "${REGISTRY}/${TARGET}:${DATE_TAG}"
            docker tag "${SOURCE}" "${REGISTRY}/${TARGET}:latest"
            docker push "${REGISTRY}/${TARGET}:${DATE_TAG}"
            docker push "${REGISTRY}/${TARGET}:latest"

            echo "### Mirrored ${SOURCE}" >> "$GITHUB_STEP_SUMMARY"
            echo "- \`${REGISTRY}/${TARGET}:${DATE_TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Trivy scan Python base
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/pablo-health/base-python:${{ steps.mirror.outputs.date_tag }}
          format: table
          severity: CRITICAL,HIGH,MEDIUM

      - name: Trivy scan Node base
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/pablo-health/base-node:${{ steps.mirror.outputs.date_tag }}
          format: table
          severity: CRITICAL,HIGH,MEDIUM

      - name: Bump pinned tags in Dockerfiles
        run: |
          DATE_TAG=${{ steps.mirror.outputs.date_tag }}

          # Find current pinned tag and replace with new date
          grep -rl 'ghcr.io/pablo-health/base-python:[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}' . | \
            xargs sed -i "s|ghcr.io/pablo-health/base-python:[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}|ghcr.io/pablo-health/base-python:${DATE_TAG}|g"

          grep -rl 'ghcr.io/pablo-health/base-node:[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}' . | \
            xargs sed -i "s|ghcr.io/pablo-health/base-node:[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}|ghcr.io/pablo-health/base-node:${DATE_TAG}|g"

      - name: Open PR if tags changed
        run: |
          DATE_TAG=${{ steps.mirror.outputs.date_tag }}
          BRANCH="chore/bump-base-images-${DATE_TAG}"

          if git diff --quiet; then
            echo "No tag changes — base images already at ${DATE_TAG}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add -u
          git commit -m "chore: bump Chainguard base images to ${DATE_TAG}"
          git push -u origin "${BRANCH}"

          gh pr create \
            --title "chore: bump Chainguard base images to ${DATE_TAG}" \
            --body "Weekly Chainguard base image update. Images mirrored from \`cgr.dev/chainguard\` to GHCR with 0 known CVEs.

          **Images updated:**
          - \`ghcr.io/pablo-health/base-python:${DATE_TAG}\`
          - \`ghcr.io/pablo-health/base-node:${DATE_TAG}\`

          Auto-generated by the mirror-base-images workflow."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
