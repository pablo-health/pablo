name: Publish Backend Base Image

on:
  push:
    branches: [main]
    paths:
      - pyproject.toml
      - poetry.lock
      - backend/Dockerfile.base
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: pablo-health/backend-base

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Compute dependency hash
        id: check
        run: |
          HASH=$(cat pyproject.toml poetry.lock | sha256sum | cut -c1-12)
          echo "tag=deps-${HASH}" >> "$GITHUB_OUTPUT"
          echo "Dependency hash: deps-${HASH}"

      - name: Check if image already exists
        id: exists
        run: |
          TOKEN=$(echo ${{ secrets.GITHUB_TOKEN }} | base64)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://ghcr.io/v2/${{ env.IMAGE_NAME }}/manifests/${{ steps.check.outputs.tag }}" 2>/dev/null || echo "000")

          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Base image ${{ steps.check.outputs.tag }} already exists, skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Base image ${{ steps.check.outputs.tag }} not found, will build."
          fi

      - name: Set up Docker Buildx
        if: steps.exists.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: steps.exists.outputs.exists == 'false'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image
        if: steps.exists.outputs.exists == 'false'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile.base
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.check.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Pass GHCR auth to buildx so it can pull the private base-python image
          secrets: |
            GIT_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}
        timeout-minutes: 45
