name: Release

# Publishes OSS container images to GitHub Container Registry (ghcr.io).
# Self-hosters pull these pre-built images via setup-solo.sh — no Cloud Build required.
#
# Triggers:
#   - push of a tag matching v* (e.g. v0.1.0) publishes :vX.Y.Z + :latest
#   - push to main publishes :main (bleeding edge)
#   - workflow_dispatch for manual runs

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OWNER: pablo-health

jobs:
  backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          BASE="${{ env.REGISTRY }}/${{ env.OWNER }}/backend"
          TAGS="${BASE}:${{ github.sha }}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="${TAGS},${BASE}:${VERSION},${BASE}:latest"
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            TAGS="${TAGS},${BASE}:main"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile.production
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          BASE="${{ env.REGISTRY }}/${{ env.OWNER }}/frontend"
          TAGS="${BASE}:${{ github.sha }}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="${TAGS},${BASE}:${VERSION},${BASE}:latest"
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            TAGS="${TAGS},${BASE}:main"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: frontend
          file: frontend/Dockerfile.production
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  pentest:
    name: Build & Push Pentest Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          BASE="${{ env.REGISTRY }}/${{ env.OWNER }}/pentest"
          TAGS="${BASE}:${{ github.sha }}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="${TAGS},${BASE}:${VERSION},${BASE}:latest"
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            TAGS="${TAGS},${BASE}:main"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile.pentest
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=pentest
          cache-to: type=gha,mode=max,scope=pentest

  deploy-oss:
    name: Deploy to pablo-oss
    needs: [backend, frontend, pentest]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.OSS_GCP_PROJECT_ID || 'pablohealth-oss' }}
      GCP_REGION: ${{ vars.OSS_GCP_REGION || 'us-central1' }}
      GCP_AR_REPO: ${{ vars.OSS_GCP_AR_REPO || 'pablo' }}
    steps:
      - name: Resolve version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.OSS_GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.OSS_GCP_DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry + GHCR
        run: |
          gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Mirror images ghcr.io → Artifact Registry
        id: mirror
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          AR_BASE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_AR_REPO}"

          for name in backend frontend pentest; do
            SRC="ghcr.io/${{ env.OWNER }}/${name}:${VERSION}"
            DST="${AR_BASE}/${name}:${VERSION}"
            echo "Mirroring ${SRC} → ${DST}"
            docker pull --platform linux/amd64 "$SRC"
            docker tag "$SRC" "$DST"
            docker push "$DST"
          done

          {
            echo "backend_image=${AR_BASE}/backend:${VERSION}"
            echo "frontend_image=${AR_BASE}/frontend:${VERSION}"
            echo "pentest_image=${AR_BASE}/pentest:${VERSION}"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy pablo-backend (Cloud Run service)
        run: |
          gcloud run services update pablo-backend \
            --image="${{ steps.mirror.outputs.backend_image }}" \
            --region="${GCP_REGION}" \
            --project="${GCP_PROJECT_ID}" \
            --quiet

      - name: Deploy pablo-frontend (Cloud Run service)
        run: |
          gcloud run services update pablo-frontend \
            --image="${{ steps.mirror.outputs.frontend_image }}" \
            --region="${GCP_REGION}" \
            --project="${GCP_PROJECT_ID}" \
            --quiet

      - name: Update pentest (Cloud Run job)
        run: |
          if gcloud run jobs describe pentest \
               --region="${GCP_REGION}" \
               --project="${GCP_PROJECT_ID}" >/dev/null 2>&1; then
            gcloud run jobs update pentest \
              --image="${{ steps.mirror.outputs.pentest_image }}" \
              --region="${GCP_REGION}" \
              --project="${GCP_PROJECT_ID}" \
              --quiet
          else
            echo "pentest job not found in ${GCP_PROJECT_ID} — skipping (run setup-solo.sh Step 11 to create it)"
          fi
