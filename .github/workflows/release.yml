name: Release

# Publishes OSS container images to GitHub Container Registry (ghcr.io).
# Self-hosters pull these pre-built images via setup-solo.sh — no Cloud Build required.
#
# Triggers:
#   - push of a tag matching v* (e.g. v0.1.0) publishes :vX.Y.Z + :latest
#   - push to main publishes :main (bleeding edge)
#   - workflow_dispatch for manual runs

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OWNER: pablo-health

jobs:
  backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          BASE="${{ env.REGISTRY }}/${{ env.OWNER }}/backend"
          TAGS="${BASE}:${{ github.sha }}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="${TAGS},${BASE}:${VERSION},${BASE}:latest"
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            TAGS="${TAGS},${BASE}:main"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile.production
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          BASE="${{ env.REGISTRY }}/${{ env.OWNER }}/frontend"
          TAGS="${BASE}:${{ github.sha }}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="${TAGS},${BASE}:${VERSION},${BASE}:latest"
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            TAGS="${TAGS},${BASE}:main"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: frontend
          file: frontend/Dockerfile.production
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  pentest:
    name: Build & Push Pentest Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          BASE="${{ env.REGISTRY }}/${{ env.OWNER }}/pentest"
          TAGS="${BASE}:${{ github.sha }}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="${TAGS},${BASE}:${VERSION},${BASE}:latest"
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            TAGS="${TAGS},${BASE}:main"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile.pentest
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=pentest
          cache-to: type=gha,mode=max,scope=pentest
