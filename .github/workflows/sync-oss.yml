name: Sync to OSS

on:
  workflow_dispatch:

jobs:
  sync:
    name: Sync monorepo to pablo-health/pablo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v6

      - name: Checkout OSS repo via deploy key
        uses: actions/checkout@v6
        with:
          repository: pablo-health/pablo
          path: pablo-oss
          ssh-key: ${{ secrets.PABLO_DEPLOY_KEY }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pipx install poetry

      - name: Run sync script
        run: bash scripts/sync-to-oss.sh "$GITHUB_WORKSPACE/pablo-oss"

      - name: Check for changes
        id: changes
        working-directory: pablo-oss
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes to sync."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git diff --cached --stat
          fi

      - name: Push sync branch
        if: steps.changes.outputs.has_changes == 'true'
        id: push
        working-directory: pablo-oss
        run: |
          BRANCH="sync/$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "sync: from therapy-assistant-platform @ ${GITHUB_SHA::8}"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "Pushed branch: $BRANCH"

      - name: Summary
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          echo "## OSS Sync Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Branch \`${{ steps.push.outputs.branch }}\` pushed to pablo-health/pablo." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Create PR locally:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "gh pr create --repo pablo-health/pablo --base main --head ${{ steps.push.outputs.branch }} --title 'sync: ...' --body '...'" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
