# Pre-commit hooks for Pablo.
#
# Install:  poetry run pre-commit install
# Run all:  poetry run pre-commit run --all-files
#
# Keep this file minimal: we want the hooks fast enough that developers
# leave them on. Heavier checks (pip-audit, pytest, trivy) live in CI.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        files: ^backend/app/
        additional_dependencies:
          - "pydantic>=2.0"
          - "fastapi>=0.100"
          - "sqlalchemy>=2.0"
        args: ["--config-file=pyproject.toml"]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(ts|tsx|js|jsx|json|md|yml|yaml)$
        exclude: ^(poetry\.lock|package-lock\.json|frontend/\.next/)

  - repo: local
    hooks:
      - id: no-underscore-audit-params
        name: "Route handlers: forbid _audit / _http_request params"
        entry: python scripts/check_audit_params.py
        language: system
        files: ^backend/app/routes/.*\.py$
        pass_filenames: false

      - id: migration-lint
        name: "Models ship with migrations (guardrail #4)"
        entry: python .claude/skills/migration-lint/check.py --staged
        language: system
        files: ^backend/(app/db/(models|platform_models)\.py|alembic/versions/.*\.py)$
        pass_filenames: false
