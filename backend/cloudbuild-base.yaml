steps:
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        DEPS_HASH=$(cat pyproject.toml poetry.lock | sha256sum | cut -c1-12)
        docker build \
          -t us-central1-docker.pkg.dev/$PROJECT_ID/pablo/backend-base:latest \
          -t us-central1-docker.pkg.dev/$PROJECT_ID/pablo/backend-base:v${_DATE_TAG} \
          -t us-central1-docker.pkg.dev/$PROJECT_ID/pablo/backend-base:deps-$${DEPS_HASH} \
          -f backend/Dockerfile.base .

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/pablo/backend-base'

substitutions:
  _DATE_TAG: '00000000'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
