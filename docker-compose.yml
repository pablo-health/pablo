services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - /app/.venv  # Prevent overwriting venv
      - ~/.config/gcloud:/home/appuser/.config/gcloud:ro  # Mount gcloud credentials (read-only)
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - ENVIRONMENT=development
      - CORS_ORIGINS=["http://localhost:3001","http://localhost:3002","http://localhost:3000"]
      - CORS_ALLOW_CREDENTIALS=true
      - DATABASE_BACKEND=postgres
      - DATABASE_URL=postgresql://pablo:pablo_dev@postgres:5432/pablo
      - GCP_PROJECT_ID=demo-therapy-platform
      - FIREBASE_PROJECT_ID=demo-therapy-platform
      - REQUIRE_BAA=false
      # AI/LLM Configuration - Vertex AI
      - AI_MODEL=${AI_MODEL:-google:gemini-3.1-pro-preview}
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
      - GOOGLE_REGION=${GOOGLE_REGION:-global}
      - GOOGLE_CALENDAR_ENCRYPTION_KEY=${GOOGLE_CALENDAR_ENCRYPTION_KEY}
      - PRACTICE_ENABLED=true
      - PRACTICE_DAILY_SESSION_LIMIT=999
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - therapy-net

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pablo
      POSTGRES_PASSWORD: pablo_dev
      POSTGRES_DB: pablo
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pablo"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - therapy-net

networks:
  therapy-net:
    driver: bridge

volumes:
  postgres-data:
